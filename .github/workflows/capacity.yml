name: Deployment capacity probe

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Absolute HTTPS deployment URL to probe"
        required: true
        type: string
      confirmation:
        description: "Enter I_UNDERSTAND to authorize traffic against the target"
        required: true
        type: string
      duration_ms:
        description: "Bounded probe duration in milliseconds (maximum 30000)"
        required: true
        default: "30000"
        type: string
      concurrency:
        description: "Concurrent requests (maximum 64)"
        required: true
        default: "8"
        type: string
      max_p95_ms:
        description: "Optional maximum p95 latency in milliseconds"
        required: false
        default: ""
        type: string
      max_failures:
        description: "Maximum failed requests allowed"
        required: true
        default: "0"
        type: string

permissions:
  contents: read

concurrency:
  group: capacity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  probe:
    name: Probe deployment capacity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.x"
      - name: Install locked package metadata
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Run bounded capacity probe
        env:
          LOAD_TEST_URL: ${{ inputs.target }}
          LOAD_TEST_CONFIRM: ${{ inputs.confirmation }}
          LOAD_TEST_DURATION_MS: ${{ inputs.duration_ms }}
          LOAD_TEST_CONCURRENCY: ${{ inputs.concurrency }}
          LOAD_TEST_MAX_P95_MS: ${{ inputs.max_p95_ms }}
          LOAD_TEST_MAX_FAILURES: ${{ inputs.max_failures }}
        run: npm run load:server
