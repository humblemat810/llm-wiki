name: Deployment capacity probe

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Absolute HTTPS deployment URL to probe"
        required: true
        type: string
      confirmation:
        description: "Enter I_UNDERSTAND to authorize traffic against the target"
        required: true
        type: string
      duration_ms:
        description: "Bounded probe duration in milliseconds (maximum 30000)"
        required: true
        default: "30000"
        type: string
      concurrency:
        description: "Concurrent requests (maximum 64)"
        required: true
        default: "8"
        type: string
      max_p95_ms:
        description: "Optional maximum p95 latency in milliseconds"
        required: false
        default: ""
        type: string
      max_failures:
        description: "Maximum failed requests allowed"
        required: true
        default: "0"
        type: string

permissions:
  contents: read

concurrency:
  group: capacity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  probe:
    name: Probe deployment capacity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.x"
      - name: Install locked package metadata
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Run bounded capacity probe
        env:
          LOAD_TEST_URL: ${{ inputs.target }}
          LOAD_TEST_ALLOWED_ORIGIN: ${{ vars.PUBLIC_ORIGIN }}
          LOAD_TEST_CONFIRM: ${{ inputs.confirmation }}
          LOAD_TEST_DURATION_MS: ${{ inputs.duration_ms }}
          LOAD_TEST_CONCURRENCY: ${{ inputs.concurrency }}
          LOAD_TEST_MAX_P95_MS: ${{ inputs.max_p95_ms }}
          LOAD_TEST_MAX_FAILURES: ${{ inputs.max_failures }}
        run: |
          set -o pipefail
          npm run load:server 2>&1 | tee capacity-probe.log
      - name: Retain capacity probe evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: capacity-probe-${{ github.run_id }}
          path: capacity-probe.log
          if-no-files-found: error
          retention-days: 14
