name: Monitor published Pages

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-monitor
  cancel-in-progress: true

jobs:
  smoke:
    name: Probe published Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22.x"
      - name: Resolve default-branch revision
        id: revision
        run: echo "value=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Probe the deployed artifact
        env:
          PAGES_DEPLOYMENT_URL: ${{ vars.PUBLIC_ORIGIN || format('https://{0}.github.io/{1}/', github.repository_owner, github.event.repository.name) }}
          PAGES_EXPECTED_REVISION: ${{ steps.revision.outputs.value }}
          PAGES_SMOKE_ATTEMPTS: "30"
          PAGES_SMOKE_RETRY_DELAY_MS: "2000"
        run: npm run smoke:pages:deployment
