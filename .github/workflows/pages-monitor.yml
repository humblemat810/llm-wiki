name: Monitor published Pages

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-monitor
  cancel-in-progress: true

jobs:
  smoke:
    name: Probe published Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.x"
      - name: Resolve default-branch revision
        id: revision
        run: echo "value=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Probe the deployed artifact
        env:
          PAGES_DEPLOYMENT_URL: ${{ vars.PUBLIC_ORIGIN || format('https://{0}.github.io/{1}/', github.repository_owner, github.event.repository.name) }}
          PAGES_EXPECTED_REVISION: ${{ steps.revision.outputs.value }}
        run: npm run smoke:pages:deployment
