name: Monitor published Pages

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-monitor
  cancel-in-progress: true

jobs:
  smoke:
    name: Probe published Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.x"
      - name: Resolve default-branch revision
        id: revision
        run: echo "value=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Probe the deployed artifact
        env:
          PAGES_DEPLOYMENT_URL: ${{ vars.PUBLIC_ORIGIN || format('https://{0}.github.io/{1}/', github.repository_owner, github.event.repository.name) }}
          PAGES_EXPECTED_REVISION: ${{ steps.revision.outputs.value }}
          PAGES_SMOKE_ATTEMPTS: "30"
          PAGES_SMOKE_RETRY_DELAY_MS: "2000"
        run: |
          set -o pipefail
          npm run smoke:pages:deployment 2>&1 | tee pages-monitor.log
      - name: Retain Pages monitor failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pages-monitor-${{ github.run_id }}
          path: pages-monitor.log
          if-no-files-found: ignore
          retention-days: 14
