name: Verify

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        node-version: ["22.x", "24.x"]
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install locked package metadata
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Verify supported Node runtime
        run: npm run runtime:check
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Build Pages artifact for artifact-dependent tests
        run: npm run build:pages
      - name: Verify Pages artifact for artifact-dependent tests
        run: npm run verify:pages
      - name: Run smoke checks
        run: npm test
      - name: Verify encrypted backup round trip
        run: npm run backup:smoke
      - name: Gate sample graph quality
        run: npm run health:sample
      - name: Run canonical production gate on the release runtime
        if: matrix.node-version == '22.x'
        run: npm run production:check
      - name: Smoke test standalone server lifecycle
        run: npm run smoke:server
      - name: Build container
        id: package
        run: |
          set -e
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          repository="https://github.com/${GITHUB_REPOSITORY}"
          documentation="$repository/blob/main/RUNBOOK.md"
          docker build --build-arg APP_VERSION="$version" --build-arg VCS_REF="$GITHUB_SHA" --build-arg PUBLIC_REPOSITORY_URL="$repository" --build-arg PUBLIC_DOCUMENTATION_URL="$documentation" --tag llm-field-notes:ci .
          test "$(docker image inspect --format '{{index .Config.Labels "org.opencontainers.image.version"}}' llm-field-notes:ci)" = "$version"
          test "$(docker image inspect --format '{{index .Config.Labels "org.opencontainers.image.revision"}}' llm-field-notes:ci)" = "$GITHUB_SHA"
          test "$(docker image inspect --format '{{index .Config.Labels "org.opencontainers.image.source"}}' llm-field-notes:ci)" = "$repository"
          test "$(docker image inspect --format '{{index .Config.Labels "org.opencontainers.image.documentation"}}' llm-field-notes:ci)" = "$documentation"
          test "$(docker image inspect --format '{{.Config.User}}' llm-field-notes:ci)" = "node"
          test "$(docker image inspect --format '{{.Config.StopSignal}}' llm-field-notes:ci)" = "SIGTERM"
          docker run --rm --entrypoint sh llm-field-notes:ci -c 'test ! -e /app/benchmarks && test ! -e /app/tests && test ! -e /app/scripts/check-runtime.mjs && test -f /app/scripts/public-assets.mjs && test -f /app/experiments/verify-backup.mjs'
      - name: Smoke test hardened container runtime
        env:
          CONTAINER_IMAGE: llm-field-notes:ci
          CONTAINER_SKIP_BUILD: "1"
          CONTAINER_EXPECTED_VERSION: ${{ steps.package.outputs.version }}
          CONTAINER_EXPECTED_REVISION: ${{ github.sha }}
          CONTAINER_EXPECTED_SOURCE: https://github.com/${{ github.repository }}
          CONTAINER_EXPECTED_DOCUMENTATION: https://github.com/${{ github.repository }}/blob/main/RUNBOOK.md
          CONTAINER_PORT: "18000"
          CONTAINER_EXTRACTOR_TOKEN: ci-extractor-token
          CONTAINER_METRICS_TOKEN: ci-metrics-token
        run: npm run smoke:container
