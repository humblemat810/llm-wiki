name: Monitor published browser experience

on:
  schedule:
    - cron: "47 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: browser-monitor
  cancel-in-progress: true

jobs:
  smoke:
    name: Probe published browser (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.x"
      - name: Install locked package metadata
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Install browser
        run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Resolve default-branch revision
        id: revision
        run: echo "value=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Smoke test the published origin
        env:
          BROWSER_ENGINE: ${{ matrix.browser }}
          BROWSER_SMOKE_URL: ${{ vars.PUBLIC_ORIGIN || format('https://{0}.github.io/{1}/', github.repository_owner, github.event.repository.name) }}
          BROWSER_SMOKE_CONFIRM: I_UNDERSTAND
          BROWSER_SMOKE_EXPECTED_REVISION: ${{ steps.revision.outputs.value }}
          BROWSER_SMOKE_EXPECTED_REPOSITORY: https://github.com/${{ github.repository }}
          BROWSER_SMOKE_ARTIFACT_DIR: browser-artifacts
        run: npm run browser:smoke
      - name: Upload browser-monitor failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: browser-monitor-${{ matrix.browser }}
          path: browser-artifacts
          if-no-files-found: ignore
          retention-days: 7
