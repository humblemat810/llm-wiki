name: Publish static wiki

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
      attestations: write
    timeout-minutes: 20
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.x"
      - name: Install locked package metadata
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - name: Verify GitHub Pages configuration
        env:
          PAGES_BASE_URL: ${{ steps.pages.outputs.base_url }}
        run: |
          if [ -z "$PAGES_BASE_URL" ]; then
            echo "::error title=GitHub Pages is not configured::Enable Settings → Pages and choose GitHub Actions as the source before publishing."
            exit 1
          fi
      - name: Run canonical production gate
        env:
          PUBLIC_ORIGIN: ${{ vars.PUBLIC_ORIGIN || steps.pages.outputs.base_url }}
          PUBLIC_REPOSITORY_URL: https://github.com/${{ github.repository }}
          BUILD_REVISION: ${{ github.sha }}
        run: npm run production:check
      - name: Retain Pages publication evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pages-publication-evidence-${{ github.run_id }}
          path: |
            sbom.spdx.json
            dist/asset-manifest.json
            dist/version.json
            dist/manifest.webmanifest
            dist/404.html
            dist/robots.txt
            dist/feed.xml
            dist/sitemap.xml
            dist/sample-graph.html
            dist/.well-known/security.txt
          if-no-files-found: error
          retention-days: 30
      - name: Attest Pages manifest and dependency SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: dist/asset-manifest.json
          sbom-path: sbom.spdx.json
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
      - name: Smoke test deployed Pages artifact
        env:
          PAGES_DEPLOYMENT_URL: ${{ vars.PUBLIC_ORIGIN || steps.deployment.outputs.page_url }}
          PAGES_EXPECTED_REVISION: ${{ github.sha }}
        run: npm run smoke:pages:deployment
  browser:
    name: Smoke deployed origin (${{ matrix.browser }})
    needs: deploy
    permissions:
      contents: read
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.x"
      - name: Install locked package metadata
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Install browser
        run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Smoke test the exact deployed origin
        env:
          BROWSER_ENGINE: ${{ matrix.browser }}
          BROWSER_SMOKE_URL: ${{ vars.PUBLIC_ORIGIN || needs.deploy.outputs.page_url }}
          BROWSER_SMOKE_CONFIRM: I_UNDERSTAND
          BROWSER_SMOKE_EXPECTED_REVISION: ${{ github.sha }}
          BROWSER_SMOKE_EXPECTED_REPOSITORY: https://github.com/${{ github.repository }}
          BROWSER_SMOKE_ARTIFACT_DIR: browser-artifacts
        run: npm run browser:smoke
      - name: Upload deployed-browser failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pages-browser-smoke-${{ matrix.browser }}
          path: browser-artifacts
          if-no-files-found: ignore
          retention-days: 7
