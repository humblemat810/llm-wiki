name: Browser smoke matrix

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: browser-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke ${{ matrix.browser }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22.x"
      - name: Install locked package metadata
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Install browser
        run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Run browser smoke
        env:
          BROWSER_ENGINE: ${{ matrix.browser }}
          BROWSER_SMOKE_ARTIFACT_DIR: browser-artifacts
        run: npm run browser:smoke
      - name: Upload browser failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: browser-smoke-${{ matrix.browser }}
          path: browser-artifacts
          if-no-files-found: ignore
          retention-days: 7
