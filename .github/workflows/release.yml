name: Validate versioned release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.x"
      - name: Install locked package metadata
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Validate tag and release metadata
        run: npm run release:tag:check
      - name: Run the canonical production gate
        run: npm run production:check
      - name: Build versioned production container
        id: package
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          docker build --build-arg APP_VERSION="$version" --build-arg VCS_REF="$GITHUB_SHA" --tag llm-field-notes:release .
      - name: Smoke test versioned production container
        env:
          CONTAINER_IMAGE: llm-field-notes:release
          CONTAINER_SKIP_BUILD: "1"
          CONTAINER_EXPECTED_VERSION: ${{ steps.package.outputs.version }}
          CONTAINER_EXPECTED_REVISION: ${{ github.sha }}
          CONTAINER_PORT: "18002"
          CONTAINER_EXTRACTOR_TOKEN: ci-extractor-token
          CONTAINER_METRICS_TOKEN: ci-metrics-token
        run: npm run smoke:container
